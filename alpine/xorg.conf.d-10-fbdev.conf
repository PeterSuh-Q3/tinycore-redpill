# 대상: /etc/X11/xorg.conf.d/10-fbdev.conf
# TC의 Xfbdev(kdrive 계열 setuid glibc 바이너리)를 대신하는 apk 네이티브
# Xorg + xf86-video-fbdev 조합의 프레임버퍼 드라이버 설정.
# Xorg.wrap(suid)은 -config 절대경로를 거부하므로 conf.d 스니펫으로 배치.
Section "Device"
    Identifier "Framebuffer"
    Driver "fbdev"
    Option "fbdev" "/dev/fb0"
EndSection
Section "Screen"
    Identifier "Screen0"
    Device "Framebuffer"
EndSection
