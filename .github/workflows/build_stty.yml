name: Build static stty (musl)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    # ── [P1 수정] CFLAGS를 job 레벨 env로 선언 → 모든 스텝에서 공유됨 ──
    env:
      MUSL_CFLAGS: >-
        -DS_IXUGO=0111
        -DS_IRWXUGO=0777
        -DS_IRUGO=0444
        -DS_IWUGO=0222
        -Dtimezone_t=void*
        -DO_BINARY=0
        -DFNM_EXTMATCH=0

    steps:
      # ── 1. 의존성 설치 ──────────────────────────────────────────
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y musl-tools wget xz-utils

      # ── 2. coreutils 8.32 소스 다운로드 ────────────────────────
      - name: Download coreutils 8.32
        run: |
          wget -q https://ftp.gnu.org/gnu/coreutils/coreutils-8.32.tar.xz
          tar -xf coreutils-8.32.tar.xz

      # ── 3. Configure ─────────────────────────────────────────────
      - name: Configure
        run: |
          cd coreutils-8.32
          FORCE_UNSAFE_CONFIGURE=1 ./configure \
            CC=musl-gcc \
            LDFLAGS="-static" \
            CFLAGS="$MUSL_CFLAGS" \
            --prefix=/tmp/coreutils-out \
            --disable-nls \
            --disable-acl \
            --disable-xattr

      # ── 4. config.h 및 소스 패치 ────────────────────────────────
      - name: Patch config.h and sources
        run: |
          cd coreutils-8.32

          # [P2 수정] sed의 치환 성공 여부에 의존하지 않고 강제로 append
          # (이미 정의되어 있어도 마지막 정의가 우선되므로 안전)
          echo '#ifndef GNULIB_defined_FDUPFD_CLOEXEC' >> lib/config.h
          echo '# define GNULIB_defined_FDUPFD_CLOEXEC 1' >> lib/config.h
          echo '#endif' >> lib/config.h

          # [P5 수정] limits.h 외 stdint.h도 추가하여 INTMAX_MAX 등 보장
          sed -i '1s|^|#include <limits.h>\n#include <stdint.h>\n|' lib/xdectoint.c

          # [P3 수정] S_IXUGO 등이 musl 헤더에 이미 정의된 경우 재정의 충돌 방지
          # sys/stat.h 이후에 정의가 오도록 compat 헤더 생성
          cat > lib/sys_stat_compat.h << 'HEADER'
          #pragma once
          #ifndef S_IXUGO
          # define S_IXUGO  0111
          #endif
          #ifndef S_IRWXUGO
          # define S_IRWXUGO 0777
          #endif
          #ifndef S_IRUGO
          # define S_IRUGO  0444
          #endif
          #ifndef S_IWUGO
          # define S_IWUGO  0222
          #endif
          HEADER

          # MUSL_CFLAGS의 S_IXUGO 계열 플래그를 제거하고 compat 헤더 방식으로 대체
          # (config.h에 include 추가)
          echo '#include "sys_stat_compat.h"' >> lib/config.h

      # ── 5. 빌드 ──────────────────────────────────────────────────
      - name: Build stty
        run: |
          cd coreutils-8.32

          # [P4 수정] lib → src 순서로 의존성 먼저 빌드 후 stty 링크
          # CFLAGS를 make에도 명시적으로 전달
          make -j$(nproc) lib \
            CC=musl-gcc \
            LDFLAGS="-static" \
            CFLAGS="$MUSL_CFLAGS"

          make -j$(nproc) src/stty \
            CC=musl-gcc \
            LDFLAGS="-static" \
            CFLAGS="$MUSL_CFLAGS"

      # ── 6. 바이너리 검증 ─────────────────────────────────────────
      - name: Verify binary
        run: |
          file coreutils-8.32/src/stty
          ls -lh coreutils-8.32/src/stty
          # 정적 링크 확인 (ldd가 "not a dynamic executable" 출력해야 정상)
          ldd coreutils-8.32/src/stty || true

      # ── 7. 아티팩트 업로드 ──────────────────────────────────────
      - name: Upload stty artifact
        uses: actions/upload-artifact@v4
        with:
          name: stty-static-musl
          path: coreutils-8.32/src/stty
          if-no-files-found: error
