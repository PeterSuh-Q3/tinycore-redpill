name: Build stty (musl static via musl-gcc on Ubuntu)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y musl-tools wget xz-utils

      - name: Download GNU coreutils source
        run: |
          wget -q https://ftp.gnu.org/gnu/coreutils/coreutils-9.1.tar.xz
          tar -xf coreutils-9.1.tar.xz

      - name: Configure and Build stty
        run: |
          cd coreutils-9.1
          FORCE_UNSAFE_CONFIGURE=1 ./configure \
            CC=musl-gcc \
            LDFLAGS="-static" \
            CFLAGS="-DS_IXUGO=0111 -DS_IRWXUGO=0777 -DS_IRUGO=0444 -DS_IWUGO=0222 \
                    -Dtimezone_t=void*" \
            --prefix=/tmp/coreutils-out \
            --disable-nls \
            --disable-acl \
            --disable-xattr
          make -j$(nproc) src/stty

      - name: Verify binary
        run: |
          file coreutils-9.1/src/stty
          ls -lh coreutils-9.1/src/stty
          file coreutils-9.1/src/stty | grep -i static

      - name: Collect artifact
        run: |
          cp coreutils-9.1/src/stty ./stty-static

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: stty-x86_64-linux-musl-static
          path: stty-static
          retention-days: 30
