name: Build static stty (musl)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      # ── 1. 의존성 설치 ──────────────────────────────────────────
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y musl-tools wget xz-utils

      # ── 2. coreutils 8.32 소스 다운로드 ────────────────────────
      - name: Download coreutils 8.32
        run: |
          wget -q https://ftp.gnu.org/gnu/coreutils/coreutils-8.32.tar.xz
          tar -xf coreutils-8.32.tar.xz

      - name: Configure
        run: |
          cd coreutils-8.32
          export CFLAGS="-DS_IXUGO=0111 -DS_IRWXUGO=0777 -DS_IRUGO=0444 -DS_IWUGO=0222 \
                         -Dtimezone_t=void* -DO_BINARY=0 -DFNM_EXTMATCH=0"
          FORCE_UNSAFE_CONFIGURE=1 ./configure \
            CC=musl-gcc \
            LDFLAGS="-static" \
            CFLAGS="$CFLAGS" \
            --prefix=/tmp/coreutils-out \
            --disable-nls \
            --disable-acl \
            --disable-xattr
      
      - name: Patch config.h and xdectoint.c
        run: |
          cd coreutils-8.32
          # GNULIB_defined_FDUPFD_CLOEXEC는 config.h에서 직접 정의
          sed -i 's/^#undef GNULIB_defined_FDUPFD_CLOEXEC.*/#define GNULIB_defined_FDUPFD_CLOEXEC 1/' lib/config.h
          # xdectoint.c INTMAX/INTMIN 패치
          sed -i '1s|^|#include <limits.h>\n|' lib/xdectoint.c
      
      - name: Build src/stty
        run: |
          cd coreutils-8.32
          make -j$(nproc) src/stty

      # ── 5. 바이너리 검증 ─────────────────────────────────────────
      - name: Verify binary
        run: |
          file coreutils-8.32/src/stty
          ls -lh coreutils-8.32/src/stty

      # ── 6. 아티팩트 업로드 ──────────────────────────────────────
      - name: Upload stty artifact
        uses: actions/upload-artifact@v4
        with:
          name: stty-static-musl
          path: coreutils-8.32/src/stty
          if-no-files-found: error
