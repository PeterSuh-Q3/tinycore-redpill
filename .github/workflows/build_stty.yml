name: Build static stty (uutils/coreutils)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Install musl target
        run: rustup target add x86_64-unknown-linux-musl

      - name: Checkout uutils/coreutils
        uses: actions/checkout@v4
        with:
          repository: uutils/coreutils
          tag: '0.7.0'

      - name: Build stty only (static musl)
        run: |
          cargo build -p uu_stty \
            --release \
            --target x86_64-unknown-linux-musl
          cp target/x86_64-unknown-linux-musl/release/stty ./stty

      - name: Verify binary
        run: |
          file stty
          ls -lh stty
          ldd stty || true

      - name: Upload stty artifact
        uses: actions/upload-artifact@v4
        with:
          name: stty-static-musl
          path: stty
          if-no-files-found: error
