name: Build static stty (Alpine)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Build static stty via Alpine container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}":/out \
            alpine:3.19 \
            sh -c "
              apk add --no-cache coreutils binutils &&
              cp /bin/stty /out/stty &&
              strip /out/stty
            "

      - name: Verify binary
        run: |
          file stty
          ls -lh stty
          ldd stty || true

      - name: Upload stty artifact
        uses: actions/upload-artifact@v4
        with:
          name: stty-static-musl
          path: stty
          if-no-files-found: error
