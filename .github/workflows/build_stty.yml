name: Build static stty (musl)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      # ── 1. 의존성 설치 ──────────────────────────────────────────
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y musl-tools wget xz-utils

      # ── 2. coreutils 8.32 소스 다운로드 ────────────────────────
      - name: Download coreutils 8.32
        run: |
          wget -q https://ftp.gnu.org/gnu/coreutils/coreutils-8.32.tar.xz
          tar -xf coreutils-8.32.tar.xz

      # ── 3. Configure ─────────────────────────────────────────────
      - name: Configure
        run: |
          cd coreutils-8.32
          FORCE_UNSAFE_CONFIGURE=1 ./configure \
            CC=musl-gcc \
            LDFLAGS="-static" \
            CFLAGS="-DO_BINARY=0 -DFNM_EXTMATCH=0" \
            --prefix=/tmp/coreutils-out \
            --disable-nls \
            --disable-acl \
            --disable-xattr

      # ── 4. 소스 패치 ────────────────────────────────────────────
      - name: Patch sources
        run: |
          cd coreutils-8.32

          # [에러1 수정] timezone_t / S_IXUGO 등:
          # config.h를 건드리면 gnulib 내부 매크로(_GL_ATTRIBUTE_FORMAT_PRINTF 등)
          # 정의 순서가 파괴되어 error.c:205 컴파일 실패 발생.
          # 해결: musl_compat.h를 생성하고 CFLAGS에 -include 절대경로로 주입.
          # → config.h를 전혀 수정하지 않음
          # → 모든 컴파일 단위 최앞에 강제 삽입됨
          printf '%s\n' \
            '/* musl compat: timezone_t */' \
            '#ifndef _TIMEZONE_T_DEFINED' \
            '# define _TIMEZONE_T_DEFINED' \
            'typedef void* timezone_t;' \
            '#endif' \
            '' \
            '/* musl compat: S_IXUGO 등 POSIX 확장 매크로 */' \
            '#include <sys/stat.h>' \
            '#ifndef S_IXUGO' \
            '# define S_IXUGO  (S_IXUSR|S_IXGRP|S_IXOTH)' \
            '#endif' \
            '#ifndef S_IRWXUGO' \
            '# define S_IRWXUGO (S_IRWXU|S_IRWXG|S_IRWXO)' \
            '#endif' \
            '#ifndef S_IRUGO' \
            '# define S_IRUGO  (S_IRUSR|S_IRGRP|S_IROTH)' \
            '#endif' \
            '#ifndef S_IWUGO' \
            '# define S_IWUGO  (S_IWUSR|S_IWGRP|S_IWOTH)' \
            '#endif' \
            > lib/musl_compat.h

          # [에러2 수정] fcntl.c:507이 참조하는 매크로는
          # GNULIB_defined_F_DUPFD_CLOEXEC (F_ 포함).
          # config.h 맨 끝에 append → 기존 내용/순서 보존
          printf '%s\n' \
            '' \
            '/* musl compat: F_DUPFD_CLOEXEC runtime detection */' \
            '#ifndef GNULIB_defined_F_DUPFD_CLOEXEC' \
            '# define GNULIB_defined_F_DUPFD_CLOEXEC 1' \
            '#endif' \
            >> lib/config.h

          # xdectoint.c: INTMAX_MAX 등 보장
          sed -i '1s|^|#include <limits.h>\n#include <stdint.h>\n|' lib/xdectoint.c

      # ── 5. 빌드 ──────────────────────────────────────────────────
      - name: Build stty
        run: |
          cd coreutils-8.32
          # -include 절대경로: 모든 .c 파일 컴파일 시 musl_compat.h를 최우선 삽입
          # configure 시 CFLAGS와 동일하게 make에도 전달
          make -j$(nproc) src/stty \
            CC=musl-gcc \
            LDFLAGS="-static" \
            CFLAGS="-DO_BINARY=0 -DFNM_EXTMATCH=0 -include $(pwd)/lib/musl_compat.h"

      # ── 6. 바이너리 검증 ─────────────────────────────────────────
      - name: Verify binary
        run: |
          file coreutils-8.32/src/stty
          ls -lh coreutils-8.32/src/stty
          ldd coreutils-8.32/src/stty || true

      # ── 7. 아티팩트 업로드 ──────────────────────────────────────
      - name: Upload stty artifact
        uses: actions/upload-artifact@v4
        with:
          name: stty-static-musl
          path: coreutils-8.32/src/stty
          if-no-files-found: error
