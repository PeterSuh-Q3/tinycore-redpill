name: Build static stty (musl)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    # [수정] -Dtimezone_t=void* 제거 (전역 토큰 치환 → error.c 파싱 파괴)
    # [수정] S_IXUGO 등 제거 → compat 헤더 방식으로 대체
    # 꼭 필요한 플래그만 유지
    env:
      MUSL_CFLAGS: "-DO_BINARY=0 -DFNM_EXTMATCH=0"

    steps:
      # ── 1. 의존성 설치 ──────────────────────────────────────────
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y musl-tools wget xz-utils

      # ── 2. coreutils 8.32 소스 다운로드 ────────────────────────
      - name: Download coreutils 8.32
        run: |
          wget -q https://ftp.gnu.org/gnu/coreutils/coreutils-8.32.tar.xz
          tar -xf coreutils-8.32.tar.xz

      # ── 3. Configure ─────────────────────────────────────────────
      - name: Configure
        run: |
          cd coreutils-8.32
          FORCE_UNSAFE_CONFIGURE=1 ./configure \
            CC=musl-gcc \
            LDFLAGS="-static" \
            CFLAGS="$MUSL_CFLAGS" \
            --prefix=/tmp/coreutils-out \
            --disable-nls \
            --disable-acl \
            --disable-xattr

      # ── 4. 소스 패치 ────────────────────────────────────────────
      - name: Patch sources
        run: |
          cd coreutils-8.32

          # ── [에러1 수정] timezone_t: -Dtimezone_t=void* 는 전처리기가
          #   코드 전체의 "timezone_t" 토큰을 "void*"로 치환해서
          #   error.c의 함수 선언 파싱을 파괴함.
          #   → typedef 선언으로 타입을 올바르게 제공하는 compat 헤더 사용
          cat > lib/timezone_compat.h << 'HEADER'
          /* musl does not define timezone_t; provide a compatible stub */
          #pragma once
          #ifndef _TIMEZONE_T_DEFINED
          # define _TIMEZONE_T_DEFINED
          typedef void* timezone_t;
          #endif
          HEADER

          # config.h 맨 앞에 삽입 (다른 헤더보다 먼저 읽혀야 함)
          echo '#include "timezone_compat.h"' | cat - lib/config.h > /tmp/config_patched.h
          mv /tmp/config_patched.h lib/config.h

          # ── [에러2 수정] fcntl.c:507이 참조하는 매크로는
          #   GNULIB_defined_F_DUPFD_CLOEXEC (F_ 포함)
          #   원본/이전 워크플로우는 GNULIB_defined_FDUPFD_CLOEXEC (F_ 빠진 오타)
          #   컴파일러 힌트: "did you mean 'GNULIB_defined_FDUPFD_CLOEXEC'?"
          #   → 올바른 이름으로 정의
          echo '' >> lib/config.h
          echo '/* musl compat: F_DUPFD_CLOEXEC runtime detection */' >> lib/config.h
          echo '#ifndef GNULIB_defined_F_DUPFD_CLOEXEC' >> lib/config.h
          echo '# define GNULIB_defined_F_DUPFD_CLOEXEC 1' >> lib/config.h
          echo '#endif' >> lib/config.h

          # ── S_IXUGO 등: -D 플래그 대신 ifndef 가드 compat 헤더로 안전하게 제공
          cat > lib/stat_compat.h << 'HEADER'
          /* musl may not define these POSIX extensions */
          #pragma once
          #include <sys/stat.h>
          #ifndef S_IXUGO
          # define S_IXUGO  (S_IXUSR|S_IXGRP|S_IXOTH)
          #endif
          #ifndef S_IRWXUGO
          # define S_IRWXUGO (S_IRWXU|S_IRWXG|S_IRWXO)
          #endif
          #ifndef S_IRUGO
          # define S_IRUGO  (S_IRUSR|S_IRGRP|S_IROTH)
          #endif
          #ifndef S_IWUGO
          # define S_IWUGO  (S_IWUSR|S_IWGRP|S_IWOTH)
          #endif
          HEADER
          echo '#include "stat_compat.h"' >> lib/config.h

          # ── xdectoint.c: INTMAX_MAX 등 보장
          sed -i '1s|^|#include <limits.h>\n#include <stdint.h>\n|' lib/xdectoint.c

      # ── 5. 빌드 ──────────────────────────────────────────────────
      - name: Build stty
        run: |
          cd coreutils-8.32
          # make src/stty 가 lib/*.o 도 함께 빌드함 (빌드 로그에서 확인됨)
          make -j$(nproc) src/stty \
            CC=musl-gcc \
            LDFLAGS="-static" \
            CFLAGS="$MUSL_CFLAGS"

      # ── 6. 바이너리 검증 ─────────────────────────────────────────
      - name: Verify binary
        run: |
          file coreutils-8.32/src/stty
          ls -lh coreutils-8.32/src/stty
          # 정적 링크 확인: "not a dynamic executable" 이어야 정상
          ldd coreutils-8.32/src/stty || true

      # ── 7. 아티팩트 업로드 ──────────────────────────────────────
      - name: Upload stty artifact
        uses: actions/upload-artifact@v4
        with:
          name: stty-static-musl
          path: coreutils-8.32/src/stty
          if-no-files-found: error
