name: Build static stty (musl)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      # в”Җв”Җ 1. мқҳмЎҙм„ұ м„Өм№ҳ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y musl-tools wget xz-utils

      # в”Җв”Җ 2. coreutils 8.32 мҶҢмҠӨ лӢӨмҡҙлЎңл“ң в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - name: Download coreutils 8.32
        run: |
          wget -q https://ftp.gnu.org/gnu/coreutils/coreutils-8.32.tar.xz
          tar -xf coreutils-8.32.tar.xz

      # в”Җв”Җ 3. мҶҢмҠӨ нҢЁм№ҳ (configure м „) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - name: Patch sources
        run: |
          cd coreutils-8.32

          # musl_compat.h: мӢңмҠӨн…ң н—ӨлҚ”лҘј мқјм Ҳ includeн•ҳм§Җ м•ҠмқҢ.
          # -includeлЎң config.hліҙлӢӨ лЁјм Җ мӮҪмһ…лҗҳлҜҖлЎң #include <sys/stat.h> л“ұмқҙ
          # musl cdefs мІҙмқёмқ„ мЎ°кё° лЎңл“ңн•ҳл©ҙ gnulibмқҳ _GL_ATTRIBUTE_FORMAT_PRINTF
          # л“ұ л§ӨнҒ¬лЎң м •мқҳк°Җ кј¬м—¬ error.c:205 м»ҙнҢҢмқј мӢӨнҢЁ л°ңмғқ.
          # вҶ’ л§ӨнҒ¬лЎң/typedefл§Ң мҲңмҲҳн•ҳкІҢ м •мқҳ, н—ӨлҚ” include м—ҶмқҢ.
          # вҶ’ S_IXUGO л“ұмқҖ POSIX н‘ңмӨҖ 8м§„мҲҳ лҰ¬н„°лҹҙлЎң м§Ғм ‘ м •мқҳ.
          printf '%s\n' \
            '/* stddef.h: ptrdiff_t л“ұ кё°ліё нғҖмһ… м ңкіө (cdefs м¶©лҸҢ м—ҶмқҢ) */' \
            '#include <stddef.h>' \
            '' \
            '/* musl compat: timezone_t */' \
            '#ifndef _TIMEZONE_T_DEFINED' \
            '# define _TIMEZONE_T_DEFINED' \
            'typedef void* timezone_t;' \
            '#endif' \
            '' \
            '/* musl compat: O_BINARY / O_TEXT (Windows м „мҡ©, muslм—җ м—ҶмқҢ) */' \
            '#ifndef O_BINARY' \
            '# define O_BINARY 0' \
            '#endif' \
            '#ifndef O_TEXT' \
            '# define O_TEXT 0' \
            '#endif' \
            '' \
            '/* musl compat: S_IXUGO л“ұ - мӢңмҠӨн…ң н—ӨлҚ” include м—Ҷмқҙ лҰ¬н„°лҹҙлЎң м •мқҳ */' \
            '#ifndef S_IXUGO' \
            '# define S_IXUGO  0111' \
            '#endif' \
            '#ifndef S_IRWXUGO' \
            '# define S_IRWXUGO 0777' \
            '#endif' \
            '#ifndef S_IRUGO' \
            '# define S_IRUGO  0444' \
            '#endif' \
            '#ifndef S_IWUGO' \
            '# define S_IWUGO  0222' \
            '#endif' \
            > lib/musl_compat.h

          # [м—җлҹ¬2 мҲҳм •] GNULIB_defined_F_DUPFD_CLOEXEC вҶ’ config.h append
          printf '%s\n' \
            '' \
            '/* musl compat: F_DUPFD_CLOEXEC runtime detection */' \
            '#ifndef GNULIB_defined_F_DUPFD_CLOEXEC' \
            '# define GNULIB_defined_F_DUPFD_CLOEXEC 1' \
            '#endif' \
            >> lib/config.h

          # xdectoint.c: INTMAX_MAX л“ұ ліҙмһҘ
          sed -i '1s|^|#include <limits.h>\n#include <stdint.h>\n|' lib/xdectoint.c

      # в”Җв”Җ 4. Configure в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - name: Configure
        run: |
          cd coreutils-8.32
          # configureмҷҖ make м–‘мӘҪм—җ лҸҷмқјн•ң CFLAGS м Ғмҡ© (нҠ№нһҲ -include кІҪлЎң мқјм№ҳ)
          # musl_compat.hк°Җ configure н…ҢмҠӨнҠём—җлҸ„ м Ғмҡ©лҗҳм–ҙм•ј config.hк°Җ мҳ¬л°”лҘҙкІҢ мғқм„ұлҗЁ
          FORCE_UNSAFE_CONFIGURE=1 ./configure \
            CC=musl-gcc \
            LDFLAGS="-static" \
            CFLAGS="-DO_BINARY=0 -DFNM_EXTMATCH=0 -include $(pwd)/lib/musl_compat.h" \
            --prefix=/tmp/coreutils-out \
            --disable-nls \
            --disable-acl \
            --disable-xattr

      # в”Җв”Җ 5. л№Ңл“ң в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - name: Build stty
        run: |
          cd coreutils-8.32
          make -j$(nproc) src/stty \
            CC=musl-gcc \
            LDFLAGS="-static" \
            CFLAGS="-DO_BINARY=0 -DFNM_EXTMATCH=0 -include $(pwd)/lib/musl_compat.h"

      # в”Җв”Җ 6. л°”мқҙл„ҲлҰ¬ кІҖмҰқ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - name: Verify binary
        run: |
          file coreutils-8.32/src/stty
          ls -lh coreutils-8.32/src/stty
          ldd coreutils-8.32/src/stty || true

      # в”Җв”Җ 7. м•„нӢ°нҢ©нҠё м—…лЎңл“ң в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - name: Upload stty artifact
        uses: actions/upload-artifact@v4
        with:
          name: stty-static-musl
          path: coreutils-8.32/src/stty
          if-no-files-found: error
