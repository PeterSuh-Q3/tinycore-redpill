name: Build stty (musl static via Alpine)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Install musl toolchain
        run: |
          sudo apt-get install -y musl-tools wget xz-utils

      - name: Download and build coreutils
        run: |
          wget -q https://ftp.gnu.org/gnu/coreutils/coreutils-9.1.tar.xz
          tar -xf coreutils-9.1.tar.xz
          cd coreutils-9.1
          CC=musl-gcc FORCE_UNSAFE_CONFIGURE=1 ./configure \
            LDFLAGS="-static" \
            --prefix=/tmp/coreutils-out \
            --disable-nls \
            --disable-acl \
            --disable-xattr
          make -j$(nproc) src/stty
          
      - name: Verify binary
        run: |
          file coreutils-9.1/src/stty
          ls -lh coreutils-9.1/src/stty
          file coreutils-9.1/src/stty | grep -i static

      - name: Collect artifact
        run: |
          cp coreutils-9.1/src/stty ./stty-static

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: stty-x86_64-linux-musl-static
          path: stty-static
          retention-days: 30
