name: Build stty (musl static via Alpine)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: alpine:3.19

    steps:
      - name: Install build dependencies
        run: |
          apk add --no-cache build-base musl-dev libc-dev wget xz-dev perl git

      - name: Download GNU coreutils source
        run: |
          wget -q https://ftp.gnu.org/gnu/coreutils/coreutils-9.4.tar.xz
          tar -xf coreutils-9.4.tar.xz

      - name: Configure (stty only, musl static)
        run: |
          cd coreutils-9.4
          FORCE_UNSAFE_CONFIGURE=1 ./configure \
            CC=gcc \
            CFLAGS="-O2" \
            LDFLAGS="-static" \
            --prefix=/tmp/coreutils-out \
            --disable-nls \
            --disable-acl \
            --disable-xattr \
            --without-gmp

      - name: Build stty only
        run: |
          cd coreutils-9.4
          make -j$(nproc) src/stty

      - name: Verify binary
        run: |
          file coreutils-9.4/src/stty
          ls -lh coreutils-9.4/src/stty
          file coreutils-9.4/src/stty | grep -i static

      - name: Collect artifact
        run: |
          cp coreutils-9.4/src/stty ./stty-static

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: stty-x86_64-linux-musl-static
          path: stty-static
          retention-days: 30
