name: Alpine - Tar my.sh.gz (TEST, no commit)

on:
  workflow_dispatch:
    inputs:
      board:
        description: 'board'
        required: true
        default: "1"
jobs:
  tar_compress_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Compress shell files (test output, no repo commit)
        id: remake-mydata-tgz
        run: |
          VERSION=v`cat functions.sh | grep rploaderver= | cut -d\" -f2`
          echo "Version: ${VERSION}"
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT

          chmod +x preoff.sh
          tar -zcvf my.sh.gz.test lang.tgz i18n.h functions.sh monitor.sh menu.sh menu_m.sh ntp.sh sngen.sh macgen.sh edisk.sh tc_recover.sh dts_mapping.sh models.json custom_config.json modules.alias.4.json extractor.gz preoff.sh

          echo "--- 아카이브 내 소유권/권한 사전 체크 ---"
          tar -tvzf my.sh.gz.test

          mkdir -p /tmp/perm_check
          tar -xzf my.sh.gz.test -C /tmp/perm_check
          echo "--- 실행권한(+x) 확인 ---"
          find /tmp/perm_check -maxdepth 1 -type f ! -perm -u+x -name "*.sh" -print

      - name: Check original localhost.apkovl.tar.gz ownership (baseline)
        run: |
          echo "--- 원본 localhost.apkovl.tar.gz 내 민감 파일 소유권(기준값) ---"
          tar -tvzf localhost.apkovl.tar.gz | grep -E 'etc/shadow|etc/passwd|etc/sudoers\.d|etc/ssh/ssh_host_' || true

      - name: Rebuild localhost.apkovl.tar.gz (test output, no repo commit; sudo tar to preserve ownership)
        id: rebuild-apkovl
        run: |
          sudo mkdir -p ./mydata/home/tc/
          sudo tar -zxvf localhost.apkovl.tar.gz -C ./mydata/

          # tc 계정의 실제 uid:gid를 원본 apkovl에서 동적으로 확인 (하드코딩 금지)
          TC_OWNER=$(stat -c '%u:%g' ./mydata/home/tc/functions.sh)
          echo "tc 계정 uid:gid = ${TC_OWNER}"

          sudo cp -vf my.sh.gz.test lang.tgz i18n.h functions.sh monitor.sh menu.sh menu_m.sh ntp.sh sngen.sh macgen.sh edisk.sh tc_recover.sh dts_mapping.sh models.json custom_config.json modules.alias.4.json extractor.gz preoff.sh user_config.json ./mydata/home/tc/
          sudo mv -f ./mydata/home/tc/my.sh.gz.test ./mydata/home/tc/my.sh.gz
          # mv는 대상 inode를 새 파일로 완전히 교체하므로, my.sh.gz(신규 생성분)만
          # tc 소유권으로 명시적으로 재적용. 그 외 기존 파일을 덮어쓴 cp는 원본
          # inode를 유지하므로 이미 tc 소유권 그대로임.
          sudo chown "${TC_OWNER}" ./mydata/home/tc/my.sh.gz

          sudo tar -zcvf localhost.apkovl.tar.gz.test -C ./mydata/ .
          sudo chown "$(id -u):$(id -g)" localhost.apkovl.tar.gz.test

          [ -f ./mydata/home/tc/custom-module ] && sudo rm ./mydata/home/tc/custom-module
          cd ./mydata/home/tc
          sudo tar -cf - ./ | pigz -p 2 | sudo tee ${GITHUB_WORKSPACE}/xtcrp.tgz.test > /dev/null
          sudo chown "$(id -u):$(id -g)" ${GITHUB_WORKSPACE}/xtcrp.tgz.test

      - name: Check rebuilt localhost.apkovl.tar.gz.test ownership (contamination check)
        run: |
          echo "--- 재가공된 localhost.apkovl.tar.gz.test 내 민감 파일 소유권 ---"
          tar -tvzf localhost.apkovl.tar.gz.test | grep -E 'etc/shadow|etc/passwd|etc/sudoers\.d|etc/ssh/ssh_host_' || true

          echo ""
          echo "--- 전체 오염 스캔: 소유자가 root가 아닌 항목 개수 (root:shadow 등 root 소유 + 비-root 그룹은 정상) ---"
          NONROOT_COUNT=$(tar -tvzf localhost.apkovl.tar.gz.test | awk '{print $2}' | grep -vc '^root/' || true)
          echo "non-root owned entries: ${NONROOT_COUNT}"
          if [ "${NONROOT_COUNT}" -gt 0 ]; then
            echo "::warning::localhost.apkovl.tar.gz.test에 소유자가 root가 아닌 항목이 ${NONROOT_COUNT}개 있습니다. 아래 목록 확인 필요."
            tar -tvzf localhost.apkovl.tar.gz.test | awk '$2 !~ /^root\// {print}'
          fi

          echo ""
          echo "--- home/tc 항목의 실제 숫자 uid/gid 확인 (원본 tc 계정 uid=1001과 비교) ---"
          tar --numeric-owner -tvzf localhost.apkovl.tar.gz.test | grep 'home/tc/functions.sh\|home/tc/menu.sh$\|home/tc/my.sh.gz$'
          echo "--- (참고) runner 계정의 uid ---"
          id

      - name: Upload my.sh.gz.test artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: my.sh.gz.test-${{ steps.remake-mydata-tgz.outputs.VERSION }}
          path: my.sh.gz.test

      - name: Upload localhost.apkovl.tar.gz.test artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: localhost.apkovl.tar.gz.test-${{ steps.remake-mydata-tgz.outputs.VERSION }}
          path: localhost.apkovl.tar.gz.test

      - name: Upload xtcrp.tgz.test artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: xtcrp.tgz.test-${{ steps.remake-mydata-tgz.outputs.VERSION }}
          path: xtcrp.tgz.test
